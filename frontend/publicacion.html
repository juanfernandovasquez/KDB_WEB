<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicación | Katarzyna Legal & Tributario</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/publicacion.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>
<body data-page="publicacion">
  <div id="site-header"></div>

  <main>
    <section class="hero hero-single" id="post-hero">
      <div class="hero-track">
        <div class="hero-slide">
          <img id="post-hero-image" src="" alt="">
        </div>
      </div>
      <div class="hero-content">
        <p class="hero-kicker" id="post-hero-kicker"></p>
        <h1 class="hero-title" id="post-hero-title"></h1>
        <p class="post-hero-date" id="post-hero-date"></p>
        <p class="hero-text" id="post-hero-subtitle"></p>
      </div>
      <div class="hero-dots"></div>
    </section>

    <div class="post-body-shell">
      <section class="post-content-section">
        <div class="post-meta">
          <a class="back-link" href="publicaciones.html">&larr; Volver a publicaciones</a>
          <span class="post-author-label">Escrito por <span id="post-author"></span></span>
        </div>
        <div class="post-layout">
          <div class="post-main">
            <article id="post-content" class="post-content"></article>
            <div class="post-share">
              <div class="post-share-line"></div>
              <div class="post-share-row">
                <span class="post-share-label">Compartir en:</span>
                <div class="post-share-links">
                  <a class="post-share-link" id="share-linkedin" href="#" target="_blank" rel="noopener noreferrer" aria-label="Compartir en LinkedIn">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.94 8.5H3.56V20h3.38zm.22-3.69a1.96 1.96 0 1 0-3.92 0 1.96 1.96 0 0 0 3.92 0M20 13.57c0-3.43-1.83-5.02-4.27-5.02-1.97 0-2.85 1.08-3.34 1.84V8.5H9.01c.04 1.25 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.12-.92.27-.68.88-1.39 1.92-1.39 1.35 0 1.89 1.03 1.89 2.53V20H20z"/></svg>
                  </a>
                  <a class="post-share-link" id="share-facebook" href="#" target="_blank" rel="noopener noreferrer" aria-label="Compartir en Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 20v-6.46h2.17l.33-2.52H13.5V9.41c0-.73.2-1.23 1.24-1.23H16V5.93c-.22-.03-.98-.09-1.86-.09-1.84 0-3.11 1.12-3.11 3.18v1.99H8.94v2.52h2.09V20z"/></svg>
                  </a>
                  <a class="post-share-link" id="share-x" href="#" target="_blank" rel="noopener noreferrer" aria-label="Compartir en X">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 3H21l-4.6 5.26L21.8 21h-4.23l-3.3-4.77L10.1 21H8l4.92-5.62L7.8 3h4.3l3 4.36zm-.74 16.7h1.16L11.46 4.2h-1.24z"/></svg>
                  </a>
                  <button class="post-share-link post-share-copy" id="share-copy" type="button" aria-label="Copiar enlace">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3H6a2 2 0 0 0-2 2v11h2V5h9zm3 4H10a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2m0 12H10V9h8z"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <aside class="post-sidebar" aria-label="Informacion adicional">
            <section class="post-sidebar-latest">
              <div class="post-sidebar-head">
                <h2>Últimas publicaciones</h2>
              </div>
              <div class="post-sidebar-list" id="post-sidebar-latest-list"></div>
            </section>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="./js/config.js"></script>
  <script src="./js/header.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/post-page.js"></script>
  <script src="./js/page-reveal.js"></script>
  <script src="./js/img-reveal.js"></script>
</body>
</html>
