<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicación | KDB Legal & Tributario</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/publicacion.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>
<body data-page="publicacion">
  <div id="site-header"></div>

  <main>
    <section class="hero hero-single" id="post-hero">
      <div class="hero-track">
        <div class="hero-slide">
          <img id="post-hero-image" src="" alt="">
        </div>
      </div>
      <div class="hero-content">
        <p class="hero-kicker" id="post-hero-kicker"></p>
        <h1 class="hero-title" id="post-hero-title"></h1>
        <p class="post-hero-date" id="post-hero-date"></p>
        <p class="hero-text" id="post-hero-subtitle"></p>
      </div>
      <div class="hero-dots"></div>
    </section>

    <section class="post-content-section">
      <div class="post-meta">
        <a class="back-link" href="publicaciones.html">&larr; Volver a publicaciones</a>
        <span class="post-author-label">Escrito por <span id="post-author"></span></span>
      </div>
      <div class="post-layout">
        <div class="post-main">
          <article id="post-content" class="post-content"></article>
        </div>
        <aside class="post-sidebar" aria-label="Informacion adicional">
          <article class="founder-card">
            <img
              class="founder-photo"
              src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=640&q=80"
              alt="Socia fundadora"
              loading="lazy"
            >
            <p class="founder-kicker">Socia fundadora</p>
            <h3 class="founder-name">Dra. Katarzyna</h3>
            <p class="founder-role">Lidera la estrategia legal y tributaria del estudio con enfoque preventivo y de negocio.</p>
            <a class="founder-link" href="./nosotros.html">Conocer perfil completo</a>
          </article>
        </aside>
      </div>
    </section>

    <section class="related-publications" id="post-latest-section">
      <div class="publications-header">
        <h2>Publicaciones recientes</h2>
        <p>Las tres publicaciones mas actuales.</p>
      </div>
      <div class="publication-row" id="post-latest-list"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="./js/config.js"></script>
  <script src="./js/header.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/post-page.js"></script>
</body>
</html>
