<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nosotros | Katarzyna Legal & Tributario</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/nosotros.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>
<body data-page="nosotros">
  <div id="site-header"></div>

  <main>
    <div id="site-hero"></div>
    <section class="story-section">
      <div class="story-card">
        <div class="story-heading">
          <h2 class="story-title">Nuestra historia</h2>
        </div>
        <div class="story-image">
          <img src="" alt="Nuestra historia" />
        </div>
        <div class="story-copy">
          <div class="story-text"></div>
        </div>
      </div>
    </section>

    <section class="nosotros-message-section hidden" id="nosotros-message-section">
      <div class="nosotros-message-card">
        <div class="nosotros-message-copy">
          <h2 id="nosotros-message-title"></h2>
          <div id="nosotros-message-content"></div>
          <div class="nosotros-message-actions">
            <a class="btn intro-primary" id="nosotros-message-primary" href="#"></a>
            <a class="btn intro-secondary" id="nosotros-message-secondary" href="#"></a>
          </div>
        </div>
      </div>
      <div class="nosotros-team-divider" aria-hidden="true"></div>
    </section>

    <section class="team-section" id="equipo">
      <div class="team-header">
        <h2>Conoce a nuestro equipo</h2>
        <p>Especialistas en tributación y corporativo, listos para acompañar tus decisiones.</p>
      </div>
      <div class="team-grid"></div>
    </section>
  </main>

  <div class="team-modal hidden" id="team-modal" aria-hidden="true">
    <div class="team-modal-backdrop" id="team-modal-backdrop"></div>
    <div class="team-modal-dialog" role="dialog" aria-modal="true" aria-label="Detalle del equipo">
      <button type="button" class="team-modal-close" id="team-modal-close" aria-label="Cerrar">&times;</button>
      <div class="team-modal-media">
        <img id="team-modal-image" src="" alt="">
      </div>
      <div class="team-modal-content">
        <h3 id="team-modal-name"></h3>
        <p class="team-modal-role" id="team-modal-role"></p>
        <div class="team-modal-divider"></div>
        <p class="team-modal-description" id="team-modal-description"></p>
        <div class="team-modal-social" id="team-modal-social">
          <a id="team-modal-linkedin" class="team-modal-social-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <img src="./assets/icons/linkedin.png" alt="">
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="./js/config.js"></script>
  <!-- Ajv opcional eliminado; validate.js se degrada si no está presente -->
  <script src="./js/validate.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/content.js"></script>
  <script src="./js/header.js"></script>
  <script src="./js/hero.js"></script>
  <script src="./js/newsletter.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/page-nosotros.js"></script>
  <script src="./js/page-reveal.js"></script>
  <script src="./js/img-reveal.js"></script>
</body>
</html>
