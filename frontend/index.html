<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katarzyna Legal &amp; Tributario</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/home.css" />
  <link rel="stylesheet" href="./css/footer.css" />
</head>
<body data-page="home">
  <div id="site-header"></div>

  <main>
    <div id="site-hero"></div>

    <section class="intro-section">
      <div class="intro-card">
        <div class="intro-heading">
          <h2 id="intro-title">Asesoria estrategica en derecho tributario</h2>
        </div>
        <div class="intro-image">
          <img id="intro-image" src="" alt="" style="display:none;" />
        </div>
        <div class="intro-copy">
          <div class="intro-text" id="intro-content">
            <p>En Katarzyna Legal &amp; Tributario acompanamos a empresas y directivos con soluciones claras y accionables.</p>
          </div>
          <div class="intro-actions">
            <a class="btn intro-primary" id="intro-primary-btn" href="#">Conoce nuestra firma</a>
            <a class="btn intro-secondary" id="intro-secondary-btn" href="#">Agenda una reunion</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="./js/config.js"></script>
  <!-- Ajv opcional eliminado para evitar bloqueos de tracking; validate.js se degrada si no está presente -->
  <script src="./js/api.js"></script>
  <script src="./js/validate.js"></script>
  <script src="./js/content.js"></script>
  <script src="./js/header.js"></script>
  <script src="./js/hero.js"></script>
  <script src="./js/newsletter.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/script.js"></script>
  <script src="./js/page-reveal.js"></script>
  <script src="./js/img-reveal.js"></script>
</body>
</html>
